<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ArmForge</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --card: #21262d;
      --accent: #1a73e8;
      --text: #f0f6fc;
      --muted: #8b949e;
      --border: #30363d;
      --green: #3fb950;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      max-width: 430px;
      margin: 0 auto;
      padding-bottom: 80px;
    }

    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo { font-size: 22px; font-weight: 800; color: var(--accent); letter-spacing: -0.5px; }
    .logo span { color: var(--text); }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 10;
    }

    .nav-btn {
      flex: 1;
      padding: 12px 0;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 11px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      transition: color 0.2s;
    }

    .nav-btn.active { color: var(--accent); }
    .nav-btn svg { width: 22px; height: 22px; }

    .view { display: none; padding: 20px; }
    .view.active { display: block; }

    /* Auth */
    .auth-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 24px;
    }

    .auth-logo { font-size: 48px; font-weight: 900; color: var(--accent); margin-bottom: 6px; }
    .auth-tagline { color: var(--muted); margin-bottom: 40px; font-size: 14px; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .card-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 14px;
    }

    input, select, textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      color: var(--text);
      font-size: 16px;
      margin-bottom: 12px;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }

    input:focus, select:focus, textarea:focus { border-color: var(--accent); }
    select option { background: var(--surface); }

    label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      font-family: inherit;
    }

    .btn:active { opacity: 0.75; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
    .btn-ghost { background: transparent; color: var(--muted); font-size: 14px; width: auto; padding: 6px 12px; }

    .feel-grid { display: flex; gap: 8px; }

    .feel-btn {
      flex: 1;
      padding: 12px 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      font-size: 20px;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
    }

    .feel-btn.selected {
      border-color: var(--accent);
      background: rgba(214, 40, 57, 0.15);
    }

    .distance-row {
      display: grid;
      grid-template-columns: 75px 1fr 1fr 36px;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }

    .distance-row input { margin-bottom: 0; font-size: 15px; padding: 10px 10px; }

    .remove-btn {
      width: 36px;
      height: 38px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: none;
      color: var(--muted);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .workout-distance {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .workout-distance:last-child { border-bottom: none; }

    .distance-ft { font-size: 22px; font-weight: 700; }
    .distance-sublabel { font-size: 12px; color: var(--muted); }
    .distance-reps { font-size: 18px; font-weight: 600; color: var(--accent); }

    .session-item {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .session-date { font-weight: 600; font-size: 15px; }
    .session-meta { font-size: 13px; color: var(--muted); margin-top: 4px; }
    .session-feel { font-size: 22px; }

    .progress-bar {
      background: var(--border);
      border-radius: 4px;
      height: 6px;
      margin-top: 14px;
      overflow: hidden;
    }

    .progress-fill {
      background: var(--accent);
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--green);
      color: white;
      padding: 12px 24px;
      border-radius: 25px;
      font-weight: 600;
      font-size: 14px;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show { opacity: 1; }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      text-align: center;
    }

    .stat-value { font-size: 30px; font-weight: 800; color: var(--accent); }
    .stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; }

    .section-title { font-size: 20px; font-weight: 700; margin-bottom: 16px; }
    .text-muted { color: var(--muted); font-size: 14px; }

    .divider {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      margin: 16px 0;
      position: relative;
    }

    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: var(--border);
    }

    .divider::before { left: 0; }
    .divider::after { right: 0; }

    .empty-state { text-align: center; padding: 48px 20px; color: var(--muted); }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }

    .error-msg {
      background: rgba(214, 40, 57, 0.1);
      border: 1px solid rgba(214, 40, 57, 0.3);
      color: #ff6b7a;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 12px;
    }

    .col-labels {
      display: grid;
      grid-template-columns: 75px 1fr 1fr 36px;
      gap: 8px;
      margin-bottom: 6px;
    }

    .col-label { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

    .consistency-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .pace-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
    }

    .pace-badge.on-pace { background: rgba(63, 185, 80, 0.15); color: var(--green); border: 1px solid rgba(63, 185, 80, 0.3); }
    .pace-badge.behind  { background: rgba(255, 165, 0, 0.15); color: #f0a500; border: 1px solid rgba(255, 165, 0, 0.3); }
    .pace-badge.no-data { background: rgba(139, 148, 158, 0.15); color: var(--muted); border: 1px solid var(--border); }

    .consistency-dots {
      display: flex;
      gap: 6px;
      margin-top: 12px;
    }

    .dot {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      flex-direction: column;
      gap: 1px;
    }

    .dot.threw { background: var(--accent); color: white; }
    .dot.rest  { background: var(--border); color: var(--muted); }
    .dot-label { font-size: 9px; color: var(--muted); text-align: center; margin-top: 4px; }
  </style>
</head>
<body>

<!-- Auth Screen -->
<div id="auth-screen" class="auth-container">
  <div class="auth-logo">ArmForge</div>
  <div class="auth-tagline">Track your throwing program</div>

  <div style="width:100%;max-width:360px;">
    <div id="auth-error" class="error-msg" style="display:none;"></div>

    <div id="login-form">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="you@email.com" autocomplete="email">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
      <button class="btn btn-primary" onclick="login()">Sign In</button>
      <div class="divider">or</div>
      <button class="btn btn-ghost" style="width:100%;padding:12px;" onclick="showSignup()">Create an account</button>
    </div>

    <div id="signup-form" style="display:none;">
      <label>Name</label>
      <input type="text" id="signup-name" placeholder="Your name">
      <label>Email</label>
      <input type="email" id="signup-email" placeholder="you@email.com" autocomplete="email">
      <label>Password</label>
      <input type="password" id="signup-password" placeholder="Min. 6 characters" autocomplete="new-password">
      <button class="btn btn-primary" onclick="signup()">Create Account</button>
      <div class="divider">or</div>
      <button class="btn btn-ghost" style="width:100%;padding:12px;" onclick="showLogin()">Sign in to existing account</button>
    </div>
  </div>
</div>

<!-- Main App -->
<div id="app" style="display:none;">
  <div class="header">
    <div class="logo">Arm<span>Forge</span></div>
    <button class="btn btn-ghost" onclick="logout()">Sign out</button>
  </div>

  <!-- Home -->
  <div id="view-home" class="view active">
    <div style="margin-bottom:20px;">
      <div class="text-muted" id="greeting"></div>
      <div class="section-title">Today's Workout</div>
    </div>

    <div class="grid-2">
      <div class="stat-card">
        <div class="stat-value" id="stat-day">—</div>
        <div class="stat-label">Program Day</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-sessions">—</div>
        <div class="stat-label">Sessions Done</div>
      </div>
    </div>

    <div class="consistency-card">
      <div>
        <div style="font-size:13px;color:var(--muted);margin-bottom:4px;">This week</div>
        <div style="font-size:22px;font-weight:800;" id="stat-week">— <span style="font-size:14px;font-weight:400;color:var(--muted);">sessions</span></div>
        <div style="font-size:12px;color:var(--muted);margin-top:4px;" id="stat-last-threw"></div>
      </div>
      <div id="pace-badge"></div>
    </div>

    <div class="card" style="margin-bottom:16px;">
      <div class="card-title">Last 7 Days</div>
      <div class="consistency-dots" id="consistency-dots"></div>
      <div style="display:flex;gap:6px;margin-top:6px;" id="consistency-labels"></div>
    </div>

    <div class="card">
      <div class="card-title" id="today-phase">Prescribed Workout</div>
      <div id="today-distances"></div>
      <div class="progress-bar">
        <div class="progress-fill" id="program-progress" style="width:0%"></div>
      </div>
      <div class="text-muted" id="progress-label" style="font-size:12px;margin-top:8px;"></div>
    </div>

    <button class="btn btn-primary" onclick="goToLog()">Log Today's Session</button>
  </div>

  <!-- Log -->
  <div id="view-log" class="view">
    <div class="section-title">Log Session</div>

    <div class="card">
      <div class="card-title">Throws</div>
      <div class="col-labels">
        <div class="col-label">Dist (ft)</div>
        <div class="col-label">Reps</div>
        <div class="col-label">Velo (mph)</div>
        <div></div>
      </div>
      <div id="throw-rows"></div>
      <button class="btn btn-secondary" onclick="addThrowRow()" style="font-size:14px;padding:10px;margin-top:4px;">+ Add Distance</button>
    </div>

    <div class="card">
      <div class="card-title">How did your arm feel?</div>
      <div class="feel-grid" id="feel-grid">
        <button class="feel-btn" data-val="1" onclick="selectFeel(1)">😣</button>
        <button class="feel-btn" data-val="2" onclick="selectFeel(2)">😕</button>
        <button class="feel-btn" data-val="3" onclick="selectFeel(3)">😐</button>
        <button class="feel-btn" data-val="4" onclick="selectFeel(4)">🙂</button>
        <button class="feel-btn" data-val="5" onclick="selectFeel(5)">💪</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Notes (optional)</div>
      <textarea id="session-notes" placeholder="Soreness, mechanics notes..." rows="3" style="resize:none;margin-bottom:0;"></textarea>
    </div>

    <button class="btn btn-primary" onclick="saveSession()">Save Session</button>
  </div>

  <!-- History -->
  <div id="view-history" class="view">
    <div class="section-title">Session History</div>
    <div id="history-list"></div>
  </div>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <button class="nav-btn active" id="nav-home" onclick="switchView('home')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      Home
    </button>
    <button class="nav-btn" id="nav-log" onclick="switchView('log')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
      Log
    </button>
    <button class="nav-btn" id="nav-history" onclick="switchView('history')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
      History
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://grextpscybajchwomdzh.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_KsnefjFUAhX7hMYmJ9AaiQ_M8DilztX';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Standard 20-day interval throwing program
const PROGRAM = [
  { day: 1,  phase: 'Phase 1 — Short Toss',   distances: [{ft: 45,  reps: 25}] },
  { day: 2,  phase: 'Phase 1 — Short Toss',   distances: [{ft: 45,  reps: 25}] },
  { day: 3,  phase: 'Phase 1 — Short Toss',   distances: [{ft: 60,  reps: 25}] },
  { day: 4,  phase: 'Phase 1 — Short Toss',   distances: [{ft: 60,  reps: 25}] },
  { day: 5,  phase: 'Phase 2 — Mid Toss',     distances: [{ft: 90,  reps: 25}] },
  { day: 6,  phase: 'Phase 2 — Mid Toss',     distances: [{ft: 90,  reps: 25}] },
  { day: 7,  phase: 'Phase 2 — Mid Toss',     distances: [{ft: 120, reps: 25}] },
  { day: 8,  phase: 'Phase 2 — Mid Toss',     distances: [{ft: 120, reps: 25}] },
  { day: 9,  phase: 'Phase 3 — Progressive',  distances: [{ft: 60, reps: 10}, {ft: 90, reps: 10}, {ft: 120, reps: 10}] },
  { day: 10, phase: 'Phase 3 — Progressive',  distances: [{ft: 90, reps: 10}, {ft: 120, reps: 10}, {ft: 150, reps: 10}] },
  { day: 11, phase: 'Phase 3 — Progressive',  distances: [{ft: 90, reps: 10}, {ft: 120, reps: 10}, {ft: 150, reps: 10}] },
  { day: 12, phase: 'Phase 3 — Progressive',  distances: [{ft: 90, reps: 10}, {ft: 150, reps: 10}, {ft: 180, reps: 10}] },
  { day: 13, phase: 'Phase 4 — Long Toss',    distances: [{ft: 90, reps: 10}, {ft: 150, reps: 10}, {ft: 180, reps: 10}] },
  { day: 14, phase: 'Phase 4 — Long Toss',    distances: [{ft: 90, reps: 10}, {ft: 150, reps: 10}, {ft: 180, reps: 10}] },
  { day: 15, phase: 'Phase 4 — Long Toss',    distances: [{ft: 120, reps: 10}, {ft: 180, reps: 10}, {ft: 200, reps: 10}] },
  { day: 16, phase: 'Phase 4 — Long Toss',    distances: [{ft: 120, reps: 10}, {ft: 180, reps: 10}, {ft: 200, reps: 10}] },
  { day: 17, phase: 'Phase 5 — Max Distance', distances: [{ft: 150, reps: 10}, {ft: 200, reps: 15}] },
  { day: 18, phase: 'Phase 5 — Max Distance', distances: [{ft: 150, reps: 10}, {ft: 200, reps: 15}] },
  { day: 19, phase: 'Phase 5 — Max Distance', distances: [{ft: 150, reps: 10}, {ft: 200, reps: 20}] },
  { day: 20, phase: 'Phase 5 — Return to Play', distances: [{ft: 60, reps: 10}, {ft: 90, reps: 10}, {ft: 120, reps: 10}, {ft: 60, reps: 10}] },
];

let currentUser = null;
let selectedFeel = null;
let throwRowCount = 0;

// ── Auth ──────────────────────────────────────────────

async function login() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const { error } = await db.auth.signInWithPassword({ email, password });
  if (error) showAuthError(error.message);
}

async function signup() {
  const name = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;
  if (!name) { showAuthError('Please enter your name.'); return; }
  const { error } = await db.auth.signUp({
    email,
    password,
    options: { data: { name } }
  });
  if (error) showAuthError(error.message);
  else showAuthError('Check your email to confirm your account!');
}

async function logout() {
  await db.auth.signOut();
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

function showAuthError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg;
  el.style.display = 'block';
}

function showLogin() {
  document.getElementById('login-form').style.display = 'block';
  document.getElementById('signup-form').style.display = 'none';
  document.getElementById('auth-error').style.display = 'none';
}

function showSignup() {
  document.getElementById('login-form').style.display = 'none';
  document.getElementById('signup-form').style.display = 'block';
  document.getElementById('auth-error').style.display = 'none';
}

db.auth.onAuthStateChange((event, session) => {
  if (session?.user) {
    currentUser = session.user;
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initApp();
  }
});

// ── App ───────────────────────────────────────────────

async function initApp() {
  const name = currentUser.user_metadata?.name || 'Player';
  const hour = new Date().getHours();
  const greet = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
  document.getElementById('greeting').textContent = `${greet}, ${name}`;
  await loadDashboard();
}

async function loadDashboard() {
  const { data: sessions } = await db
    .from('sessions')
    .select('id')
    .eq('user_id', currentUser.id);

  const count = sessions?.length || 0;
  const nextDayIndex = Math.min(count, PROGRAM.length - 1);
  const programDay = PROGRAM[nextDayIndex];

  document.getElementById('stat-day').textContent = nextDayIndex + 1;
  document.getElementById('stat-sessions').textContent = count;
  document.getElementById('today-phase').textContent = programDay.phase;

  const pct = Math.round((count / PROGRAM.length) * 100);
  document.getElementById('program-progress').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${count} of ${PROGRAM.length} sessions complete`;

  // Consistency tracker
  const { data: recentSessions } = await db
    .from('sessions')
    .select('date')
    .eq('user_id', currentUser.id)
    .order('date', { ascending: false });

  const today = new Date();
  const startOfWeek = new Date(today);
  startOfWeek.setDate(today.getDate() - today.getDay()); // Sunday

  const sessionsThisWeek = (recentSessions || []).filter(s => new Date(s.date + 'T12:00:00') >= startOfWeek).length;
  document.getElementById('stat-week').innerHTML = `${sessionsThisWeek} <span style="font-size:14px;font-weight:400;color:var(--muted);">sessions</span>`;

  // Last threw
  if (recentSessions && recentSessions.length > 0) {
    const lastDate = new Date(recentSessions[0].date + 'T12:00:00');
    const diffDays = Math.round((today - lastDate) / (1000 * 60 * 60 * 24));
    const lastStr = diffDays === 0 ? 'Last threw: Today' : diffDays === 1 ? 'Last threw: Yesterday' : `Last threw: ${diffDays} days ago`;
    document.getElementById('stat-last-threw').textContent = lastStr;
  } else {
    document.getElementById('stat-last-threw').textContent = 'No sessions yet';
  }

  // Pace badge (target: 4 sessions/week)
  const target = 4;
  const dayOfWeek = today.getDay(); // 0=Sun
  const daysElapsed = dayOfWeek === 0 ? 7 : dayOfWeek;
  const expectedByNow = Math.ceil((daysElapsed / 7) * target);
  const badgeEl = document.getElementById('pace-badge');
  if (!recentSessions || recentSessions.length === 0) {
    badgeEl.innerHTML = `<span class="pace-badge no-data">⚾ Get started</span>`;
  } else if (sessionsThisWeek >= expectedByNow) {
    badgeEl.innerHTML = `<span class="pace-badge on-pace">✓ On pace</span>`;
  } else {
    badgeEl.innerHTML = `<span class="pace-badge behind">↑ Pick it up</span>`;
  }

  // Last 7 days dots
  const sessionDates = new Set((recentSessions || []).map(s => s.date));
  const dotsEl = document.getElementById('consistency-dots');
  const labelsEl = document.getElementById('consistency-labels');
  dotsEl.innerHTML = '';
  labelsEl.innerHTML = '';
  const dayNames = ['Su','Mo','Tu','We','Th','Fr','Sa'];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    const dateStr = d.toISOString().split('T')[0];
    const threw = sessionDates.has(dateStr);
    const isToday = i === 0;
    const dot = document.createElement('div');
    dot.style.display = 'flex';
    dot.style.flexDirection = 'column';
    dot.style.alignItems = 'center';
    dot.style.flex = '1';
    dot.innerHTML = `
      <div class="dot ${threw ? 'threw' : 'rest'}">${threw ? '✓' : ''}</div>
      <div class="dot-label" style="${isToday ? 'color:var(--accent);font-weight:700;' : ''}">${dayNames[d.getDay()]}</div>
    `;
    dotsEl.appendChild(dot);
  }

  const distEl = document.getElementById('today-distances');
  if (count >= PROGRAM.length) {
    distEl.innerHTML = '<div style="text-align:center;padding:16px;color:var(--muted);">🎉 Program complete! Great work.</div>';
  } else {
    distEl.innerHTML = programDay.distances.map(d => `
      <div class="workout-distance">
        <div>
          <div class="distance-ft">${d.ft} <span style="font-size:14px;color:var(--muted);font-weight:400;">ft</span></div>
        </div>
        <div class="distance-reps">${d.reps} throws</div>
      </div>
    `).join('');
  }
}

// ── Log Session ───────────────────────────────────────

function goToLog() {
  switchView('log');
  resetLogForm();

  const count = parseInt(document.getElementById('stat-sessions').textContent) || 0;
  const nextDayIndex = Math.min(count, PROGRAM.length - 1);
  const programDay = PROGRAM[nextDayIndex];
  programDay.distances.forEach(d => addThrowRow(d.ft, d.reps));
}

function resetLogForm() {
  document.getElementById('throw-rows').innerHTML = '';
  document.getElementById('session-notes').value = '';
  document.querySelectorAll('.feel-btn').forEach(b => b.classList.remove('selected'));
  selectedFeel = null;
  throwRowCount = 0;
}

function addThrowRow(ft = '', reps = '', velo = '') {
  throwRowCount++;
  const id = throwRowCount;
  const row = document.createElement('div');
  row.className = 'distance-row';
  row.id = `throw-row-${id}`;
  row.innerHTML = `
    <input type="number" placeholder="45" value="${ft}" id="ft-${id}" min="10" max="450" inputmode="numeric">
    <input type="number" placeholder="25" value="${reps}" id="reps-${id}" min="1" inputmode="numeric">
    <input type="number" placeholder="—" value="${velo}" id="velo-${id}" min="40" max="110" inputmode="numeric">
    <button class="remove-btn" onclick="removeThrowRow(${id})">×</button>
  `;
  document.getElementById('throw-rows').appendChild(row);
}

function removeThrowRow(id) {
  document.getElementById(`throw-row-${id}`)?.remove();
}

function selectFeel(val) {
  selectedFeel = val;
  document.querySelectorAll('.feel-btn').forEach(b => {
    b.classList.toggle('selected', parseInt(b.dataset.val) === val);
  });
}

async function saveSession() {
  const throws = [];
  document.querySelectorAll('.distance-row').forEach(row => {
    const id = row.id.split('-')[2];
    const ft = parseInt(document.getElementById(`ft-${id}`)?.value);
    const reps = parseInt(document.getElementById(`reps-${id}`)?.value);
    const velo = parseInt(document.getElementById(`velo-${id}`)?.value) || null;
    if (ft && reps) throws.push({ distance: ft, reps, velocity: velo });
  });

  if (throws.length === 0) { showToast('Add at least one distance', false); return; }
  if (!selectedFeel) { showToast('Rate how your arm felt', false); return; }

  const count = parseInt(document.getElementById('stat-sessions').textContent) || 0;
  const programDay = Math.min(count + 1, PROGRAM.length);

  const { data: session, error } = await db.from('sessions').insert({
    user_id: currentUser.id,
    date: (() => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; })(),
    program_day: programDay,
    arm_feel: selectedFeel,
    notes: document.getElementById('session-notes').value.trim() || null
  }).select().single();

  if (error) { showToast('Error saving session', false); console.error(error); return; }

  const throwInserts = throws.map(t => ({ ...t, session_id: session.id }));
  await db.from('throws').insert(throwInserts);

  showToast('Session saved! 💪', true);
  resetLogForm();
  await loadDashboard();
  setTimeout(() => switchView('home'), 900);
}

// ── History ───────────────────────────────────────────

async function loadHistory() {
  const { data: sessions } = await db
    .from('sessions')
    .select('*, throws(*)')
    .eq('user_id', currentUser.id)
    .order('created_at', { ascending: false });

  const el = document.getElementById('history-list');

  if (!sessions || sessions.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="icon">⚾</div><div>No sessions yet.<br>Log your first throw!</div></div>`;
    return;
  }

  const feelEmoji = ['', '😣', '😕', '😐', '🙂', '💪'];

  el.innerHTML = sessions.map(s => {
    const totalThrows = s.throws?.reduce((a, t) => a + t.reps, 0) || 0;
    const distances = [...new Set(s.throws?.map(t => `${t.distance}ft`))].join(' · ') || '—';
    const maxVelo = s.throws?.map(t => t.velocity).filter(Boolean).sort((a, b) => b - a)[0];
    const dateStr = new Date(s.date + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });

    return `
      <div class="session-item" id="session-${s.id}">
        <div>
          <div class="session-date">Day ${s.program_day} — ${dateStr}</div>
          <div class="session-meta">${distances}</div>
          <div class="session-meta">${totalThrows} throws${maxVelo ? ` · Top ${maxVelo} mph` : ''}</div>
          ${s.notes ? `<div class="session-meta" style="font-style:italic;margin-top:4px;">"${s.notes}"</div>` : ''}
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:10px;">
          <div class="session-feel">${feelEmoji[s.arm_feel] || ''}</div>
          <button onclick="deleteSession('${s.id}')" style="background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;padding:0;">Delete</button>
        </div>
      </div>
    `;
  }).join('');
}

async function deleteSession(id) {
  if (!confirm('Delete this session?')) return;
  await db.from('sessions').delete().eq('id', id);
  document.getElementById(`session-${id}`)?.remove();
  await loadDashboard();
  const remaining = document.querySelectorAll('.session-item').length;
  if (remaining === 0) loadHistory();
}

// ── Navigation ────────────────────────────────────────

function switchView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`view-${name}`).classList.add('active');
  document.getElementById(`nav-${name}`).classList.add('active');
  if (name === 'history') loadHistory();
  if (name === 'home') loadDashboard();
}

// ── Toast ─────────────────────────────────────────────

let toastTimer;
function showToast(msg, success = true) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.style.background = success ? 'var(--green)' : 'var(--accent)';
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
}
</script>
</body>
</html>
